# PROMPT_ITEMS="$PROMPT_ITEMS clock"
# PROMPT_ITEMS="$PROMPT_ITEMS date"
# PROMPT_ITEMS="$PROMPT_ITEMS command_output"
# PROMPT_ITEMS="$PROMPT_ITEMS last_status"
# PROMPT_ITEMS="$PROMPT_ITEMS custom_example"

# Optional static text before your prompt items.
