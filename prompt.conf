# Default prompt items. Keep this list short and uncomment extras below as needed.
PROMPT_ITEMS="userhost cwd"

# Visual layout.
PROMPT_ITEM_SEPARATOR=" | "
PROMPT_MULTILINE=1
PROMPT_SYMBOL_SUCCESS=">"
PROMPT_SYMBOL_ERROR="x"

# Useful optional items.
# PROMPT_ITEMS="$PROMPT_ITEMS git_branch"
